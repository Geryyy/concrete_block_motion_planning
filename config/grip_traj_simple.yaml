grip_traj_server:
  ros__parameters:
    service_name: "grip_traj_movement"
    joint_states_topic: "/joint_states"
    controlled_joint_names:
      - "theta1_slewing_joint"
      - "theta2_boom_joint"
      - "theta3_arm_joint"
      - "q4_big_telescope"
      - "theta6_tip_joint"
      - "theta7_tilt_joint"
      - "theta8_rotator_joint"
      - "q9_left_rail_joint"
    dt_target: 0.01
    tcp_z_offset: 0.95  # K8 → virtual TCP (grip point), PZS100 rail length
    block_grip_z_offset: 0.1  # Block CoG → grip point on top (half block height)
    lift_height: 0.5
    gripper_open_position: 1.4   # total gripper opening (m)
    gripper_close_position: 0.4  # total gripper closing (m)
    # In sim, q9 drives one rail and the mimic plugin copies 1:1 to the other,
    # so the actual opening is 2*q9. Scale by 0.5 to match real behavior
    # where q9 = total opening. Set to 1.0 on real hardware.
    gripper_command_scale: 0.5
    # Per-segment durations in seconds (tune for commissioning)
    duration_gripper: 5.0
    duration_descend: 5.0
    duration_lift: 5.0
