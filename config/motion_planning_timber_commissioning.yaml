concrete_block_motion_planning_node:
  ros__parameters:
    planner:
      backend: "timber"
      timber_a2b_service: "a2b_movement"
      timber_grip_service: "grip_traj_movement"
      timber_goal_frame: "K0_mounting_base"
      timber_move_empty_target_z: 2.36
      timber_payload_density_kg_m3: 2400.0
      timber_payload_grippoint_xyz: [0.0, 0.0, 0.0]
    default_geometric_method: "POWELL"
    # Timber commissioning path: let the backend own motion generation directly.
    default_trajectory_method: "TIMBER_MOVE_EMPTY"
    path_interpolation_points: 81
    moving_block_size: [0.6, 0.9, 0.6]
    geometric_optimized_params_file: ""

    trajectory:
      default_horizon_steps: 120
      fast_horizon_steps: 70
      ctrl_points_min: 4
      ctrl_points_max: 10
      acados_verbose: false
      toppra_gridpoints: 121
      joint_position_limits_file: ""
      joint_accel_limits_file: ""

    execution:
      enabled: true
      backend: "action"
      trajectory_topic: "/trajectory_controllers/joint_trajectory"
      action_name: "/trajectory_controller_a2b/follow_joint_trajectory"
      result_timeout_s: 120.0
      switch_controller: false
      switch_service: "/controller_manager/switch_controller"
      activate_controller: "trajectory_controllers"
      deactivate_after_execution: true

    robot_description_topic: "/robot_description_full"

    world_model:
      get_coarse_blocks_service: "/world_model_node/get_coarse_blocks"
      get_planning_scene_service: "/world_model_node/get_planning_scene"

    named_configurations_file: ""
    default_named_configuration_joint_names:
      - "theta1_slewing_joint"
      - "theta2_boom_joint"
      - "theta3_arm_joint"
      - "q4_big_telescope"
      - "theta8_rotator_joint"
      - "q9_left_rail_joint"
    named_configuration_default_duration_s: 4.0

    wall_plan_file: ""
    default_wall_plan_name: "basic_interlocking_3_2"
    wall_plan_frame_id: "world"
