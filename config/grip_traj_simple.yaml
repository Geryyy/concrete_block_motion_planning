grip_traj_server:
  ros__parameters:
    service_name: "grip_traj_movement"
    joint_states_topic: "/joint_states"
    controlled_joint_names:
      - "theta1_slewing_joint"
      - "theta2_boom_joint"
      - "theta3_arm_joint"
      - "q4_big_telescope"
      - "theta6_tip_joint"
      - "theta7_tilt_joint"
      - "theta8_rotator_joint"
      - "q9_left_rail_joint"
    dt_target: 0.01
    tcp_z_offset: 0.95  # K8 → virtual TCP (grip point), PZS100 rail length
    block_grip_z_offset: 0.0  # Block center -> virtual TCP / grip point
    use_passive_steady_state: true
    passive_steady_state_iterations: 3
    lift_height: 0.5
    gripper_open_position: 1.4   # total gripper opening (m)
    gripper_close_position: 0.55  # total gripper closing (m) — must be ≥ block width (0.6 m) minus small squeeze; 0.4 hit the joint limit
    # q9 is the total gripper opening. Gazebo maps this to half travel per rail.
    gripper_command_scale: 1.0
    # Per-segment durations in seconds (tune for commissioning)
    duration_gripper: 8.0
    duration_descend: 5.0
    duration_lift: 5.0
