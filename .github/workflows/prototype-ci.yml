name: Prototype CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lightweight test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml numpy

      - name: Compile Python sources
        run: |
          python -m py_compile \
            scripts/motion_planning_node.py \
            scripts/cbmp/*.py \
            motion_planning/__init__.py \
            motion_planning/core/types.py \
            motion_planning/scenarios.py

      - name: Run wall-plan regression tests
        run: |
          python -m pytest -q motion_planning/tests/test_wall_plan_generator.py
